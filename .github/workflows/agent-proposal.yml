name: Agent Proposal

on:
  workflow_dispatch:
    inputs:
      model:
        description: OpenRouter model id
        required: false
        default: deepseek/deepseek-v4-flash:free

permissions:
  contents: write

jobs:
  proposal-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests before proposal
        run: npm test

      - name: Run proposal-only agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ inputs.model }}
        run: node scripts/agent-openrouter-proposal.mjs

      - name: Show source diff safety check
        run: git diff -- src tests package.json

      - name: Commit proposal report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .nabla-agent/runs
          if git diff --cached --quiet; then
            echo No proposal report changes to commit.
          else
            git commit -m "chore(agent): add proposal report"
            git push
          fi
