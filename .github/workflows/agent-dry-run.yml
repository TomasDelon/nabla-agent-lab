name: Agent Dry Run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests before dry run
        run: npm test

      - name: Run dry-run agent
        run: node scripts/agent-dry-run.mjs

      - name: Commit dry-run report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nabla-agent/runs
          if git diff --cached --quiet; then
            echo "No dry-run report changes to commit."
          else
            git commit -m "chore(agent): add dry-run report"
            git push
          fi
