name: Agent OpenRouter Report

on:
  workflow_dispatch:
    inputs:
      model:
        description: OpenRouter model id
        required: false
        default: auto-deepseek-free

permissions:
  contents: write

jobs:
  report-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests before AI report
        run: npm test

      - name: Run OpenRouter report-only agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ inputs.model }}
        run: node scripts/agent-openrouter-report.mjs

      - name: Commit AI report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .nabla-agent/runs
          if git diff --cached --quiet; then
            echo No AI report changes to commit.
          else
            git commit -m "chore(agent): add OpenRouter report"
            git push
          fi
